# discern | https://discern.sh | project configuration file
#
# discern is a stack-neutral system for coding agents and their humans.
# Use discern.toml to teach discern about your project, preferences, and tooling.
#
# The quickest way to get started is to simply tell your coding agent:
#   "Run `discern setup` and follow the instructions.".
#
# Help is always available through the command line or MCP server:
#   - Read the documentation:   `discern help`   | MCP: `discern_help`
#   - Verify your installation: `discern doctor` | MCP: `discern_doctor`
#   - Show the current status:  `discern status` | MCP: `discern_status`
#   - Refresh after an update:  `discern upgrade`
#
# Generated by discern 1.0.0 for "discern-design-system".

[meta]
setup_model = "claude-fable-5"
setup_version = "1.0.0"
# The install schema version — managed by discern (bumped by `discern upgrade`).
# Don't edit this by hand.
schema_version = 20


[project]
# Short, lowercase, dash-separated identity. Used for worktree/site/branch names.
slug = "discern-design-system"

# Branch prefix for worktrees created by discern, e.g. "agent/my-feature".
branch_prefix = "agent/"

# The trunk: the shared branch the gate merges into and completed work lands on.
# Detected from your repository at setup (origin/HEAD, then the branch setup
# started from, then init.defaultBranch). Override per-invocation with the
# DISCERN_MAIN_BRANCH env var.
main_branch = "main"

# Where the gate points an agent when a stage fails in a non-obvious way. Keep
# this doc current with the traps specific to your stack (see the comment block
# the gate prints on failure). Empty disables the pointer.
gotchas_doc = "map/80-development/done-gate-gotchas.md"

# Where the deferred-work ledger lives — the running TODO list agents read and
# maintain, relative to the project root. `discern setup` seeds it here.
todo = "discern/TODO.md"


# ─────────────────────────────────────────────────────────────────────────────
# [map] — the project map: discern's agent-maintained documentation tree. This is
# distinct from human-curated project docs: setup scaffolds it here, `discern map`
# browses it, and `${map.dir}` keeps checks/scopes/standards tied to this path.
# ─────────────────────────────────────────────────────────────────────────────

[map]
# Project-relative, and kept inside the repository.
dir = "map/"


# ─────────────────────────────────────────────────────────────────────────────
# [guidance] — the author-once → compile-everywhere agent-instruction pipeline.
# `discern refresh` compiles discern's built-in guidance (always
# prepended) plus YOUR sources below into one generated file per
# provider. The generated files are committed so every agent — cloud
# included — reads them, but never hand-edited: edit your sources below and
# re-run `discern refresh`; `discern status` / `discern done` flag a generated
# file that has drifted from its source.
# ─────────────────────────────────────────────────────────────────────────────

[guidance]
# Your guideline source file(s), relative to the project root. Globs are allowed
# (the generated agent files themselves are never picked up as sources).
# Read only if present; discern's built-in guidance is always prepended, so
# these are additive. `discern setup` lays a starter source here (and migrates
# any pre-existing CLAUDE.md/AGENTS.md into it) for your coding agent to fill.
sources = ["discern/guidance.md"]

# Which agent integrations to enable. Guidance targets:
#   "claude_code" -> CLAUDE.md   "codex" -> AGENTS.md   "gemini" -> GEMINI.md
#   "cursor" -> AGENTS.md        "copilot" -> AGENTS.md
agents = ["claude_code", "codex", "gemini", "cursor", "copilot"]


# ─────────────────────────────────────────────────────────────────────────────
# [skills] — focused, reusable task playbooks. The effective set is discern's
# bundled built-ins plus YOUR authored skills under the directory below, where
# yours override a built-in of the same name. discern materializes the set into
# each agent's skills dir (gitignored): built-ins copied, yours symlinked (edits live).
#   discern skills list           show the set + which of yours override which
#   discern skills eject <name>   copy a built-in here so you can customize it
# ─────────────────────────────────────────────────────────────────────────────

[skills]
# Where your authored skills live, relative to the project root. The default
# works with no config at all; point it elsewhere if you prefer. Read only if
# present, so a project with no authored-skills dir simply uses the built-ins.
dir = "discern/skills"

# Skill names (bundled or authored) to leave out of materialization. Every
# materialized skill occupies context in each agent session, so exclude the ones
# this project never needs. An unknown name is warned about, never fatal.
# exclude = ["a-skill-this-project-never-needs"]


# ─────────────────────────────────────────────────────────────────────────────
# [capabilities] — the core commands the gate runs, one per known capability.
# Each maps to a gate stage automatically:
#   format     fix    a formatter/codemod (mutating; runs first, serially)
#   build      build  produce artifacts later stages read (compile, bundle)
#   lint       check  read-only static analysis
#   typecheck  check  read-only type checking
#   test       test   the test suite
#   smoke      test   a fast check that the app boots in this checkout (proves it
#                     runs wherever the gate runs — including inside a worktree)
# A value is one command, or a list run in order: lint = ["eslint .", "stylelint ."].
# A job needing its own time budget takes the table form — the `timeout` (seconds)
# replaces the global [gate].timeout for that job only, 0 disables its bound:
#   test = { run = "npm test", timeout = 1200 }
# OMIT an individual capability you truly do not have yet. A config with zero wired
# capabilities is only a bootstrap state: the gate can pass without checking anything,
# so `discern doctor` reports it as a warning until at least one capability or custom
# check is wired. `discern setup` has your coding agent fill these by sniffing the repo;
# `discern doctor` shows which are wired.
#
# `discern prepare` is the fast inner loop: it runs the fix-stage then the check-stage
# capabilities, and never builds or tests.
# ─────────────────────────────────────────────────────────────────────────────

[capabilities]
test = "deno task test"
build = "deno task build && deno task check:catalogue"
typecheck = "deno task typecheck"
lint = "deno task lint"
format = "deno task fix"
# format    = "prettier --write ."   # or "ruff format ." or "gofmt -w ."
# build     = "npm run build"        # or "cargo build"
# lint      = "eslint ."             # or "ruff check ." or "golangci-lint run"
# typecheck = "tsc --noEmit"         # or "mypy ."
# test      = "npm test"             # or "pytest" or "go test ./..."
# smoke     = "your-app --version"   # a fast "does it boot?" — a CLI --version,
#                                    # a framework's inspire/about, a config-load-and-exit


# ─────────────────────────────────────────────────────────────────────────────
# [checks.<name>] — custom, non-standard gate work that isn't a known capability.
# `stage` (REQUIRED) is one of fix|build|check|test; `run` the command (or a
# list); `provides` an optional free-text label; `timeout` (seconds, optional)
# replaces the global [gate].timeout for this job only (0 disables its bound).
# Use this for anything outside the six capabilities above. A check may not
# reuse a name wired under [capabilities] — the gate keys each job's result by
# its label, so the two would collide.
# ─────────────────────────────────────────────────────────────────────────────

# [checks.licenses]
# stage    = "check"
# run      = "./scripts/check-licenses.sh"
# provides = "license-audit"


# ─────────────────────────────────────────────────────────────────────────────
# [scopes.<name>] — named regions of the repo. `paths` globs define a scope; the
# optional flags tune the gate for changes there. Classification fails OPEN: a
# path matching no scope counts as a real code change, so an unknown path runs
# MORE gates, never fewer. Globs use ** for "any depth" — a directory prefix
# ("src/**"), a standard glob ("src/**/*.ext", "src/*"), a "*.ext" suffix at
# any depth, a "/seg/" segment, or an exact path.
#   neutral     = true   changes here need no gate (docs, agent guidance)
#   previewable = true   a person could see changes here — worth a preview link
#   gate        = "..."  a command `discern done` runs when this scope changed
#                        (a sub-component with its own self-contained gate)
#   timeout     = N      seconds; replaces the global [gate].timeout for this
#                        scope's gate job only (0 disables its bound)
# ─────────────────────────────────────────────────────────────────────────────

# Paths that need no gate at all: docs and agent-guidance sources. (Generated
# guidance outputs are refreshed by the gate itself; editing the source changes
# no behaviour.) Root-level *.md is always treated as neutral.
[scopes.docs]
paths   = ["${map.dir}", "discern/", ".claude/", ".agents/"]
neutral = true

# The subset of changes a person could see — worth a preview link.
# [scopes.assets]
# paths       = ["public/**"]
# previewable = true

# A sub-component with its own self-contained gate:
# [scopes.native]
# paths = ["native/**"]
# gate  = "make -C native check"


# ─────────────────────────────────────────────────────────────────────────────
# [worktree] — the isolated-worktree workflow. The git mechanics are generic;
# everything project-specific is a RESOURCE you declare below. A fresh install
# declares none, so a worktree round is a clean no-op until you wire one.
# ─────────────────────────────────────────────────────────────────────────────

[worktree]
# Where per-worktree checkouts are created (a <name> dir is made under it).
#   ""  (the default) a SIBLING of the repo, "<repo>.worktrees/<name>" — visible
#       and adjacent, never nested inside the checkout (a worktree nested in its
#       own repo is an anti-pattern: recursive tools double-count it, and walking
#       up to the repo root mis-resolves the worktree's .git file).
#   a RELATIVE path resolves against the repo root (".claude/worktrees" nests
#       them inside the repo; "../wts" a custom sibling).
#   an ABSOLUTE path is used as-is.
root = ""

# Environment values copied from the main checkout's env files into a new
# worktree's (secrets a fresh worktree needs but that aren't in version
# control). The worktree's env file is created when absent, so a declared
# value always arrives.
inherit_env = []   # e.g. ["APP_KEY", "OPENAI_API_KEY"]

# The env files the worktree lifecycle reads and writes, in precedence order:
# when reading, the last listed file that defines a value wins (the dotenv
# override convention); a newly written value lands in the first. inherit_env
# reads these in the main checkout and writes the worktree's copy; the
# deterministic port and resource handles are recorded into them too.
env_files = [".env", ".env.local"]

# Give each worktree a deterministic dev-server port (hashed from its id) so
# concurrent worktrees never collide. Read it with `discern identity --port`.
# This is derived IDENTITY, not a resource — it provisions nothing.
port = true

# Track ignored files at worktree setup and report top-level ignored paths that
# changed before the worktree is removed. Turn this off for projects whose
# ignored outputs churn too much to be useful.
ignored_file_drift = true

# ─────────────────────────────────────────────────────────────────────────────
# [worktree.resources.<name>] — per-worktree external resources (a database, an
# emulator, a container, a queue). Each declares a `create` command (run once at
# setup) and a `destroy` (run once at teardown), with optional `ensure`
# (re-readiness at session start), `required` (default true: a create failure
# aborts setup), `retries` (default 0), and `gc` (default true: may orphan-prune
# reclaim it). Resources are CREATED top-to-bottom and DESTROYED bottom-to-top.
# Commands run via `sh -c` after @…@ token expansion; an empty command is a clean
# no-op. A worktree that vanishes without a clean teardown has its resources
# reclaimed by `discern worktree prune` (the GC safety net) — so author `create` AND
# `destroy` idempotent (`create` is skipped for an already-provisioned resource;
# `destroy` may re-run via prune) and cwd-independent (prune runs `destroy` from the
# main checkout: use @…@ handles or absolute paths, not relative ones).
#
# Runtime tokens (expanded per-worktree, at run time):
#   @worktree@      this worktree's base handle   (slug-id)
#   @resource@      this resource's handle        (slug-id-name; this resource only)
#   @db@            database-name-safe identity    (underscores; for db engines)
#   @site@          dev-server site/host name      (DNS-safe; for vhosts/tunnels)
#   @port@          the deterministic dev-server port
#   @project_slug@  your project slug
#   @dir@           this worktree's root
# Read a handle back from a project script with `discern identity --resource <name>`
# (also exported into the worktree's .env as DISCERN_RESOURCE_<NAME>).
# ─────────────────────────────────────────────────────────────────────────────

# A per-worktree database, so tests never clash. Uses @db@ (db-name-safe).
# [worktree.resources.db]
# create  = "createdb -T @project_slug@_template @db@"
# destroy = "dropdb --if-exists @db@"

# A per-worktree dev-server site (a Docker vhost, an ngrok tunnel, a reverse-proxy
# entry, …). Uses @site@ (DNS-safe). Declared after db so it is torn down first.
# [worktree.resources.dev_server]
# create  = "link-site @site@ @port@"
# destroy = "unlink-site @site@"

# Any other isolated resource — an emulator, a queue, a bucket, a namespace.
# [worktree.resources.example]
# create   = "make-thing @resource@"
# destroy  = "destroy-thing @resource@"   # idempotent: may re-run via worktree prune
# ensure   = "ensure-thing @resource@"   # optional: reconcile drift at session start
# required = true                          # optional: false = create failure is non-fatal
# retries  = 0                             # optional: retry create/destroy N times
# gc       = true                          # optional: false = never orphan-prune it
#                                          #   (teardown-only; for data-loss-sensitive ones)

# Worktree setup commands, run after the resources are provisioned — two buckets,
# the same split as a resource's create/ensure:
#   steps   one-shot scaffolding, run ONCE at creation and not re-run (skipped once
#           the worktree is configured): seed fixtures, generate a local-only file.
#   ensure  convergence, re-run on EVERY pass — at creation, on session-start
#           re-entry, and after `discern update` brings main in — so the worktree
#           tracks the current tree: install dependencies, build, run migrations.
#           Author each idempotent (it re-runs routinely); prefer a fast-when-current
#           command (`<install> check || <install>`) — the per-pass cost is yours.
# Both run in order via `sh -c`. A failed `ensure` aborts setup at creation; on a
# re-entry or update it is recorded but never undoes a merge or blocks startup.
[worktree.setup]
steps = []   # one-shot, e.g. ["seed-fixtures"]
ensure = ["deno install --frozen"]  # converge, e.g. ["<install deps>"]


# ─────────────────────────────────────────────────────────────────────────────
# [standards] — quality standards: numbers that can never get worse. Every
# `discern done` run verifies no limit loosened versus the trunk (always — that
# check has no off switch) and measures each standard in parallel with the
# tests, so a branch can neither quietly loosen a limit nor quietly regress a
# metric. None configured means none run — defining one is what turns the
# subsystem on.
#
# Each limit may only improve: line coverage, a bundle-size budget, a lint/type-
# error count, a perf budget. Each [standards.<name>]
# table declares one:
#   metric     the metric name the run emits        (default: the standard name)
#   direction  "up"   value should rise; limit is a FLOOR   (e.g. coverage)
#              "down" value should fall; limit is a CEILING (e.g. a size budget)
#   limit      the floor/ceiling — compared vs main, so a floor may only rise and
#              a ceiling may only fall (you can't loosen the gate on a branch)
#   run        the command that measures it — its output emits the metric line
#              (run by the gate alongside the tests, and by `discern standards`)
#   per        divide the metric to hold a RATE, not a raw count — so the number
#              doesn't rise just because the project grew. Either a second metric the
#              run emits, or a built-in extent discern measures itself:
#              per = { words = "${map.dir}**" }  (files | lines | words | bytes over a pathspec)
#   scale      multiply the rate so the limit reads in human units (e.g. 1000)
#   margin     headroom `discern standards --pin` leaves when it tightens this limit
#              to the measured value (default 0). Give a metric that drifts on
#              unrelated commits (a size, a coverage %) a margin so a pinned limit
#              isn't tripped by ordinary fluctuation.
#   inputs     the paths the metric reads (scope-style globs). When nothing under
#              them changed since the last recorded measurement, the gate replays
#              that value instead of re-measuring — a docs-only change pays
#              seconds, not a coverage run. Honest risk: too-narrow inputs delay
#              detection until the next measured run. Omit to always measure.
#   timeout    seconds; replaces the global [gate].timeout for this measurement
#              job only (0 disables its bound)
#   measure    "gate" (default) measures in every `discern done`; "on-demand"
#              defers a metric genuinely too slow for every gate run to
#              `discern standards` — the never-loosen limit check still runs on
#              every gate. Reach for the smaller reliefs first: declare `inputs`
#              so unchanged trees replay for free, or raise this job's `timeout`.
#
# A standard's `run` reports its number by printing a line:
#   DISCERN_METRIC <name> <number>
# (the LAST such line wins). There is no built-in or special standard — coverage
# is just the conventional name for one. None are configured by default;
# uncomment an example to enable it.
#
# Captured a gain? `discern standards --pin` tightens each improved limit to the
# value just measured and commits it — the way to tighten a standard, never a
# hand-edit (which can't tell a real gain from a quiet loosening).
# ─────────────────────────────────────────────────────────────────────────────

# Coverage — keep line coverage at or above a rising floor:
# [standards.coverage]
# direction = "up"
# limit     = 80
# run       = "your-coverage-tool"   # must emit: DISCERN_METRIC coverage <percent>
#
# Bundle size — a raw count is right here: shipped bytes are a true budget, they
# don't grow just because the repo does. Keep the artifact under a falling ceiling:
# [standards.bundle]
# metric    = "bundle_bytes"
# direction = "down"
# limit     = 500000
# run       = "printf 'DISCERN_METRIC bundle_bytes %s\\n' \"$(wc -c < dist/app.js)\""
#
# Lint density — a RATE, for a count that WOULD grow with the project. Divide by a
# built-in extent so adding clean code never breaches it, only nittier code does:
# [standards.lint_density]
# metric    = "warnings"
# direction = "down"
# per       = { lines = "src/**" }   # discern counts the lines itself
# scale     = 1000                   # express "warnings per 1,000 lines"
# limit     = 5
# run       = "your-linter --count"  # must emit: DISCERN_METRIC warnings <count>


# ─────────────────────────────────────────────────────────────────────────────
# [gate] — ergonomics for the parallel gate stages (and scope gates). These
# affect how `discern done` runs its concurrent jobs.
# ─────────────────────────────────────────────────────────────────────────────

[gate]
# Stream each job's output live (line-prefixed `── <label> │ …`) instead of
# buffering it until the stage finishes. Helps when watching a slow build/test.
# Concurrent jobs interleave (but stay labelled). Off by default (grouped).
stream = false

# Cancel the in-flight sibling commands the moment one fails, instead of running
# every command to completion. ON by default — an agent-driven gate wants a fast
# abort. Set false to run every job and see all failures in one pass. The engine
# tree-kills a cancelled job's whole process group, so its grandchildren don't
# linger.
fail_fast = true

# Per-command time budget in SECONDS, applied to every job the gate runs (each
# capability, check, scope gate, and standard measurement). A command that
# doesn't exit within it is tree-killed and the stage fails with a plain-language
# timeout diagnostic — so the gate can never hang. The usual culprit is a
# watch-mode test runner or a dev server wired without its single-run form.
# Generous by default (600 = 10 min); set 0 to disable the limit (not
# recommended — the gate can then hang forever). One legitimately slow job takes
# its own `timeout` on its config entry instead of a slower global.
timeout = 600


# ─────────────────────────────────────────────────────────────────────────────
# [coupling] — co-change detection: a read-only advisory that mines git history
# for files that change TOGETHER, so a touched file's habitual sibling isn't
# forgotten. Read it on demand with `discern coupling` (no argument → what
# co-changes with your current change set but is MISSING from it; `discern
# coupling <path>` → one file's top partners, its blast radius; `discern coupling
# <a> <b>` → the commits where both changed, to judge a coupling). It is
# ZERO-CONFIG: it self-calibrates to your repo (commit size, cadence, scale), so
# there are no thresholds to tune. Purely ADVISORY: it points at where to look
# and never blocks.
# ─────────────────────────────────────────────────────────────────────────────

[coupling]
# Surface the advisory during the gate too — `discern done` AND the fast inner
# loop `discern prepare` (as hints, at the tail — it never affects pass/fail), so
# the nudge meets a change while it is hot. Off by default; opt in to get the
# nudge in the gate as well as on demand.
in_gate = false


# ─────────────────────────────────────────────────────────────────────────────
# [scripts] — your own executable project scripts. Drop any executable into the
# directory below; `discern script` lists it and `discern script <name>` runs it.
# An optional `# desc: ...` line describes it in the listing. This directory is
# yours: `discern upgrade` never writes or refreshes anything here. Built-in names
# are legal because project scripts live under their own command namespace. A
# project script can use any language; discern exports DISCERN_* environment values
# (DISCERN_ROOT, DISCERN_SCRIPTS, DISCERN_MAIN_BRANCH, …) and forwards every
# argument after its name unchanged. It reads config by calling the binary
# (`discern config get <key>`) and resolves worktree
# identity with `discern identity --db|--site|--port|--resource <name>`.
# ─────────────────────────────────────────────────────────────────────────────

[scripts]
# Where your project scripts live, relative to the project root. The default works with
# no config at all; point it elsewhere (e.g. "tools/") if you prefer.
dir = "discern/scripts"

[checks.codegen]
provides = "generated-registry-currency"
run = "deno task codegen"
stage = "fix"

[standards.css_size]
run = "[ -f dist/discern.css ] || deno task build >/dev/null 2>&1; printf 'DISCERN_METRIC css_bytes %s\\n' \"$(wc -c < dist/discern.css | tr -d ' ')\""
limit = 140000
direction = "down"
metric = "css_bytes"
# Replay the last measurement when nothing that shapes the CSS changed.
inputs = ["src/**", "scripts/**"]
# Headroom `discern standards --pin` leaves so ordinary token/component
# work never trips a freshly pinned ceiling.
margin = 4000
