name: Publish

on:
  release:
    types: [published]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.2
      - name: Install dependencies
        run: deno install --frozen
      - name: Tag matches the package version
        run: |
          version="$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')"
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match deno.json version ${version}" >&2
            exit 1
          fi
      - name: Verify
        run: deno task verify
      - name: Publish to JSR
        run: deno publish
